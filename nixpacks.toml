[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_pgsql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.bcmath", "php83Extensions.gd", "php83Extensions.intl", "php83Extensions.redis", "nodejs_20", "nodePackages.pnpm"]

[phases.install]
cmds = [
  "pnpm install --frozen-lockfile",
  "composer install --no-dev --optimize-autoloader --no-interaction --no-progress"
]

[phases.build]
cmds = [
  "pnpm build",
  "php artisan route:cache",
  "php artisan view:cache",
  "php artisan storage:link"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=${PORT:-8080}"
